    function drawEffects(layer) {
      for (const effect of state.effects) {
        const alpha = Math.max(0, effect.life / effect.maxLife);
        const sx = worldX(effect.x);

        if (effect.type === "hook" && layer === "behind") {
          const radius = 9 + (1 - alpha) * 30;
          ctx.strokeStyle = `rgba(97, 229, 232, ${alpha * 0.8})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(sx, effect.y, radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (effect.type === "boost-trail" && layer === "behind") {
          ctx.strokeStyle = `rgba(255, 211, 90, ${alpha * 0.7})`;
          ctx.lineWidth = 2 + alpha * 2;
          ctx.beginPath();
          ctx.moveTo(sx, effect.y);
          ctx.lineTo(sx + effect.vx * 44, effect.y + effect.vy * 44);
          ctx.stroke();
        }

        if (effect.type === "no-anchor" && layer === "front") {
          ctx.fillStyle = `rgba(255, 211, 90, ${alpha})`;
          ctx.font = '800 13px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
          ctx.textAlign = "center";
          ctx.fillText("연결 거리 밖", sx, effect.y - (1 - alpha) * 12);
        }
      }
    }

    function drawBriefingCallout(targetX, targetY, boxX, boxY, title, body) {
      const box = { x: boxX, y: boxY, w: 236, h: 64 };
      const anchorX = targetX < box.x ? box.x : box.x + box.w;
      const anchorY = Math.max(box.y + 14, Math.min(box.y + box.h - 14, targetY));
      ctx.strokeStyle = "rgba(255, 211, 90, 0.7)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(targetX, targetY);
      ctx.lineTo(anchorX, anchorY);
      ctx.stroke();
      ctx.fillStyle = "rgba(255, 211, 90, 0.24)";
      ctx.beginPath();
      ctx.arc(targetX, targetY, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.arc(targetX, targetY, 3.5, 0, Math.PI * 2);
      ctx.fill();
      drawPanel(box, "rgba(4, 11, 19, 0.92)", "rgba(255, 211, 90, 0.42)");
      ctx.fillStyle = "#ffd166";
      ctx.font = '800 11px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
      ctx.textAlign = "left";
      ctx.fillText(title, box.x + 12, box.y + 19);
      ctx.fillStyle = "#dceaf2";
      ctx.font = '700 11px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
      wrapText(body, box.x + 12, box.y + 38, box.w - 24, 14);
    }

    function drawTutorialAssistCallouts() {
      const spring = state.springs.find((item) => !item.used) ?? state.springs[0];
      if (!spring) return;
      const targetX = worldX(spring.x);
      if (targetX < -40 || targetX > W + 40) return;
      const boxX = Math.max(24, Math.min(W - 260, targetX - 88));
      const boxY = Math.max(88, spring.y - 132);

    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const lines = String(text).split("\n");

      for (const rawLine of lines) {
        const words = rawLine.trim().split(/\s+/).filter(Boolean);
        let line = "";

        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y);
            line = word;
            y += lineHeight;
          } else {
            line = test;
          }
        }

        if (line) ctx.fillText(line, x, y);
        y += lineHeight;
      }
    }

    function traceStarPath(x, y, outerRadius, innerRadius = outerRadius * 0.46) {
      ctx.beginPath();
      for (let point = 0; point < 10; point++) {
        const radius = point % 2 === 0 ? outerRadius : innerRadius;
        const angle = -Math.PI / 2 + point * Math.PI / 5;
        const px = x + Math.cos(angle) * radius;
        const py = y + Math.sin(angle) * radius;
        if (point === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    function drawRatingStars(rating, centerX, centerY, radius = 20, gap = 9) {
      const totalWidth = radius * 2 * 5 + gap * 4;
      const startX = centerX - totalWidth / 2 + radius;

      for (let index = 0; index < 5; index++) {
        const x = startX + index * (radius * 2 + gap);
        const fill = Math.max(0, Math.min(1, rating - index));
        ctx.save();
        traceStarPath(x, centerY, radius);
        ctx.fillStyle = "rgba(255, 211, 90, 0.08)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 211, 90, 0.6)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        if (fill > 0) {
          traceStarPath(x, centerY, radius);
          ctx.clip();
          ctx.fillStyle = "#ffd35a";
          ctx.shadowColor = "#ffd35a";
          ctx.shadowBlur = 10;
          ctx.fillRect(x - radius, centerY - radius, radius * 2 * fill, radius * 2);
        }
        ctx.restore();
      }
    }

    function drawOverlay() {
      if (state.mode === "tutorialIntro") {
        drawDispatchStartScreen("튜토리얼 시작", "건너뛰기", true);
        return;
      }

      if (state.mode === "tutorialComplete") {
        ctx.fillStyle = "rgba(1, 5, 10, 0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#61e5e8";
        ctx.fillRect(W / 2 - 32, H / 2 - 106, 64, 3);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = '800 38px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("연습 완료", W / 2, H / 2 - 66);
        ctx.fillStyle = "#a9bac7";
        ctx.font = '15px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("실전 배송 준비가 완료되었습니다", W / 2, H / 2 - 28);
        drawCanvasButton(uiBounds.realStart, "배달 시작");
        return;
      }

      if (state.mode === "waiting") {
        drawDispatchStartScreen("배달 시작", "튜토리얼", false);
        return;
      }

      if (state.mode === "ready") {
        drawPanel(
          { x: W / 2 - 168, y: H / 2 - 54, w: 336, h: 108 },
          "rgba(5, 14, 24, 0.9)",
          "rgba(255, 211, 90, 0.52)"
        );
        ctx.fillStyle = "#ffd166";
        ctx.textAlign = "center";
        ctx.font = '800 12px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("DELIVERY READY", W / 2, H / 2 - 20);
        ctx.fillStyle = "#f4fbff";
        ctx.font = '900 24px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("클릭으로 점프", W / 2, H / 2 + 12);
        ctx.fillStyle = "#8fa1ba";
        ctx.font = '700 12px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("와이어는 클릭 유지, 부스터는 연결 중 스페이스바", W / 2, H / 2 + 38);
        return;
      }

      if (state.mode === "gameover") {
        ctx.fillStyle = "rgba(0, 3, 8, 0.68)";
        ctx.fillRect(0, 0, W, H);
        const receipt = { x: W / 2 - 205, y: 43, w: 410, h: 474 };
        drawPanel(receipt, "rgba(4, 11, 19, 0.96)", "rgba(97, 229, 232, 0.36)");

        const completed = state.runCompleted && state.status === "배달 완료";
        ctx.fillStyle = completed ? "#61e5e8" : "#ff5f6f";
        ctx.fillRect(receipt.x, receipt.y, receipt.w, 4);
        ctx.fillStyle = "#8497a8";
        ctx.textAlign = "center";
        ctx.font = '800 11px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("DELIVERY RECEIPT", W / 2, 73);
        ctx.fillStyle = "#f4fbff";
        ctx.font = '800 31px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText(completed ? "배달 완료" : "배달 실패", W / 2, 111);

        ctx.strokeStyle = "rgba(132, 151, 168, 0.24)";
        ctx.beginPath();
        ctx.moveTo(receipt.x + 28, 132);
        ctx.lineTo(receipt.x + receipt.w - 28, 132);
        ctx.stroke();

        ctx.font = '14px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        drawResultLine("종료 사유", state.status, 158);
        drawResultLine("배달 거리", `${currentDistance()}m`, 187);
        drawResultLine("정시 배달", `${state.onTimeCount}건`, 222);
        drawResultLine("지연 배달", `${state.lateCount}건`, 252);
        drawResultLine("실패 주문", `${state.missedCount}건`, 282);

        ctx.fillStyle = "#8497a8";
        ctx.textAlign = "center";
        ctx.font = '800 11px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("평점", W / 2, 310);
        drawRatingStars(currentRating(), W / 2, 334, 18, 8);
        ctx.fillStyle = "#b7c5d1";
        ctx.font = '700 11px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText(`${currentRating().toFixed(2)} / 5.00`, W / 2, 360);

        ctx.strokeStyle = "rgba(132, 151, 168, 0.24)";
        ctx.beginPath();
        ctx.moveTo(receipt.x + 28, 375);
        ctx.lineTo(receipt.x + receipt.w - 28, 375);
        ctx.stroke();

        ctx.font = '14px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        drawResultLine("최고 평점", `${state.bestRating.toFixed(2)} / 5.00`, 402);
        drawResultLine("최고 거리", `${Math.floor(state.bestDistance)}m`, 428);
        drawCanvasButton(uiBounds.resultRestart, "다시 배달");
        ctx.fillStyle = "#8497a8";
        ctx.textAlign = "center";
        ctx.font = '12px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
        ctx.fillText("R 키로 빠른 재도전", W / 2, 505);
      }
    }

    function drawResultLine(label, value, y) {
      ctx.fillStyle = "#8497a8";
      ctx.textAlign = "left";
      ctx.fillText(label, W / 2 - 145, y);
      ctx.fillStyle = "#f4fbff";
      ctx.textAlign = "right";
      ctx.font = '800 18px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
      ctx.fillText(value, W / 2 + 145, y);
      ctx.font = '15px "Apple SD Gothic Neo", "Malgun Gothic", Arial';
    }

    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      updateHud();
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerdown", startOrHook);
    canvas.addEventListener("pointermove", rememberPointer);
    canvas.addEventListener("pointerup", releaseWire);
    canvas.addEventListener("pointercancel", releaseWire);
    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (state.hook) pulseBoost();
      }
      if (event.code === "KeyR") {
        event.preventDefault();
        quickRestart();
      }
    });
    soundToggleEl.addEventListener("click", () => {
      soundMuted = !soundMuted;
      soundToggleEl.textContent = soundMuted ? "×" : "♪";
      soundToggleEl.setAttribute("aria-label", soundMuted ? "소리 켜기" : "소리 끄기");
      if (!soundMuted) {
        ensureAudio();
        startBgm();
        playTone(660, 0.08, "sine", 0.04);
      }
    });

    reset();
    if (previewMode === "drones") setupDronePreview();
    if (previewMode === "finish") setupFinishPreview();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
